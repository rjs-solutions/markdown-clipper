<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown editor</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="missing" class="missing" hidden>
      <h1>Nothing to edit</h1>
      <p>This edit session is no longer available. Open the Markdown Clipper again and choose
        <strong>Expand</strong>.</p>
    </div>

    <main id="app" class="editor" hidden>
      <header class="ed-header">
        <h1 class="wordmark"><img class="brand-mark" src="../../assets/icons/icon-48.png" alt="">Markdown Clipper <span class="ed-sub">Editor</span></h1>
        <div class="ed-header-actions">
          <span class="status" id="status" role="status" aria-live="polite"></span>
          <button class="btn btn-soft" id="do-copy" type="button">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 8h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2Z"></path>
              <path d="M4 16H3a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span>Copy</span>
          </button>
          <div class="download-split" role="group" aria-label="Download options">
            <button class="btn btn-primary download-main" id="do-download" type="button">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="M7 10l5 5 5-5"></path>
                <path d="M12 15V3"></path>
              </svg>
              <span>Download</span>
            </button>
            <button class="btn btn-primary download-location" id="do-download-location" type="button"
                    title="Choose download location" aria-label="Choose download location">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"></path>
                <path d="m9 13 2 2 4-4"></path>
              </svg>
            </button>
          </div>
          <span class="ed-sep" aria-hidden="true"></span>
          <button class="btn btn-close" id="do-close" type="button">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 6l12 12M18 6L6 18"></path>
            </svg>
            <span>Close</span>
          </button>
        </div>
      </header>

      <div class="ed-grid">
        <section class="ed-panel ed-props">
          <h2>Properties</h2>
          <label class="ed-field"><span>Title</span>
            <input id="f-title" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="ed-field"><span>File name</span>
            <span class="filename-input">
              <input id="f-filename" type="text" spellcheck="false" autocomplete="off">
              <span class="ext" aria-hidden="true">.md</span>
            </span>
          </label>
          <label class="ed-field"><span>Tags</span>
            <input id="f-tags" type="text" spellcheck="false" autocomplete="off" placeholder="comma-separated">
          </label>
          <label class="ed-field"><span>Description</span>
            <textarea id="f-description" rows="3" spellcheck="false"></textarea>
          </label>
          <label class="ed-field"><span>Author</span>
            <input id="f-author" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="ed-field"><span>Published</span>
            <input id="f-published" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="ed-field"><span>Modified</span>
            <input id="f-modified" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="ed-field"><span>Site</span>
            <input id="f-site" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="ed-field"><span>Source URL</span>
            <input id="f-url" type="text" spellcheck="false" autocomplete="off">
          </label>

          <details class="ed-vars-wrap">
            <summary>Page variables</summary>
            <div class="vars" id="vars"></div>
          </details>
        </section>

        <section class="ed-panel ed-editor">
          <h2>Markdown &middot; edit &amp; trim</h2>
          <textarea id="f-body" class="ed-body" spellcheck="false"></textarea>
        </section>

        <section class="ed-panel ed-preview">
          <h2>Output preview <span class="ed-outname" id="output-name"></span></h2>
          <pre class="ed-output" id="output"></pre>
        </section>
      </div>
    </main>

    <script type="module" src="editor.js"></script>
  </body>
</html>
