<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Web Clipper Options</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="options">
      <h1>Markdown Web Clipper Options</h1>

      <form id="options-form">
        <fieldset class="group">
          <legend>Capture</legend>

          <label class="field">
            <span>Capture mode</span>
            <select id="mode">
              <option value="auto">Auto (SharePoint when detected, else article)</option>
              <option value="sharepoint">SharePoint content region</option>
              <option value="article">Article (Readability)</option>
              <option value="full">Full page</option>
            </select>
          </label>

          <label class="field checkbox-field">
            <input id="scroll-before-capture" type="checkbox">
            <span>Scroll to bottom before capture (loads lazy content)</span>
          </label>

          <label class="field checkbox-field">
            <input id="drop-hidden" type="checkbox">
            <span>Skip hidden elements</span>
          </label>

          <label class="field">
            <span>Maximum scroll time</span>
            <span class="input-with-unit">
              <input id="max-scroll-ms" type="number" min="3000" max="45000" step="500">
              <span aria-hidden="true">ms</span>
            </span>
          </label>

          <label class="field">
            <span>Pause after each scroll</span>
            <span class="input-with-unit">
              <input id="scroll-pause-ms" type="number" min="150" max="2500" step="50">
              <span aria-hidden="true">ms</span>
            </span>
          </label>
        </fieldset>

        <fieldset class="group">
          <legend>Output</legend>

          <label class="field">
            <span>Metadata</span>
            <select id="metadata-style">
              <option value="frontmatter">YAML front matter</option>
              <option value="list">Plain list at top</option>
              <option value="none">None</option>
            </select>
          </label>

          <label class="field checkbox-field">
            <input id="include-title-heading" type="checkbox">
            <span>Add the page title as an H1 heading</span>
          </label>
        </fieldset>

        <div class="buttons">
          <button id="save" type="submit">Save</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </form>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
