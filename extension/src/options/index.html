<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Clipper Options</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="options">
      <div class="page-header">
        <h1 class="page-title"><img class="brand-mark" src="../../assets/icons/icon-48.png" alt="">Markdown Clipper <span class="page-title-sub">Options</span></h1>
        <div class="page-header-actions">
          <div class="page-header-save">
            <span id="status" class="sr-only" role="status" aria-live="polite"></span>
            <button id="save" type="submit" form="options-form" hidden>Save</button>
          </div>
          <button class="page-close-button" id="close-options" type="button" title="Close Options tab" aria-label="Close Options tab">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 5l14 14M19 5 5 19"></path></svg>
          </button>
        </div>
      </div>

      <div class="settings">
        <nav id="settings-nav" class="settings-nav" aria-label="Settings sections"></nav>

        <form id="options-form" class="settings-content">
          <div id="panels"></div>
        </form>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
