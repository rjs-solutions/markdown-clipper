<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Clipper</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1 class="wordmark"><img class="brand-mark" src="../../assets/icons/icon-48.png" alt="">Markdown Clipper</h1>
        <div class="clip-state-wrap" id="clip-state-wrap" hidden>
          <button class="clip-state" id="clip-state" type="button" aria-expanded="false" aria-controls="clip-state-popover">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M9 5h6M9 3h6v4H9Z"></path><path d="M7 5H5v16h14V5h-2"></path><path class="clip-state-check" d="m8 14 2.5 2.5L16 11"></path><path class="clip-state-change" d="m9 12 6 6m0-6-6 6"></path>
            </svg>
          </button>
          <div class="clip-state-popover" id="clip-state-popover" hidden>
            <strong id="clip-state-title">Previously clipped</strong>
            <span id="clip-state-detail"></span>
            <span class="clip-state-path" id="clip-state-path"></span>
            <button id="clip-state-collection" type="button" hidden>View collection</button>
          </div>
        </div>
        <div class="header-actions">
          <div class="header-actions-group">
            <button class="icon-button" id="do-panel" type="button" title="Open in page" aria-label="Open in page" hidden>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <rect x="12" y="12" width="7" height="5" rx="1"></rect>
              </svg>
            </button>
            <button class="icon-button" id="do-sidepanel" type="button" title="Open in side panel" aria-label="Open in side panel" hidden>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <rect x="4" y="4" width="18" height="16" rx="2"></rect>
                <path d="M16 4v16"></path>
              </svg>
            </button>
          </div>
          <div class="header-actions-divider" aria-hidden="true"></div>
          <div class="header-actions-group">
            <button class="icon-button" id="open-options" type="button" title="Options" aria-label="Options">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
                <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 0 1-4 0v-.08A1.7 1.7 0 0 0 9 19.36a1.7 1.7 0 0 0-1.88.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.63 15 1.7 1.7 0 0 0 3.07 14H3a2 2 0 0 1 0-4h.08a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.88l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.63a1.7 1.7 0 0 0 1-1.56V3a2 2 0 0 1 4 0v.08a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.37 9c.18.6.74 1 1.56 1H21a2 2 0 0 1 0 4h-.08a1.7 1.7 0 0 0-1.52 1Z"></path>
              </svg>
            </button>
          </div>
          <div class="header-actions-divider" id="close-divider" aria-hidden="true" hidden></div>
          <button class="icon-button icon-button-close" id="do-close-panel" type="button" title="Close panel" aria-label="Close panel" hidden>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 5l14 14M19 5L5 19"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Loading state while the preview capture runs -->
      <div class="loading" id="loading">
        <span class="spinner" aria-hidden="true"></span>
        <span>Reading this page&#8230;</span>
      </div>

      <!-- Empty / error state (non-capturable page or capture failure) -->
      <div class="empty" id="empty" hidden>
        <p id="empty-message">This page can&rsquo;t be captured.</p>
      </div>

      <!-- The clip card -->
      <div class="card" id="card" hidden>
        <div class="props" id="props"></div>

        <label class="field field-title">
          <span>Title</span>
          <input id="f-title" type="text" spellcheck="false" autocomplete="off">
        </label>

        <div class="field-row">
          <label class="field field-filename">
            <span>File name</span>
            <span class="filename-input">
              <input id="f-filename" type="text" spellcheck="false" autocomplete="off">
              <span class="ext" aria-hidden="true">.md</span>
            </span>
          </label>
          <label class="field field-tags">
            <span>Tags</span>
            <input id="f-tags" type="text" spellcheck="false" autocomplete="off" placeholder="comma-separated">
          </label>
        </div>

        <label class="field field-description">
          <span>Description</span>
          <textarea id="f-description" rows="3" spellcheck="false"></textarea>
        </label>

        <div class="preview-meta">
          <span class="content-type" id="content-type"></span>
          <span class="char-count" id="char-count"></span>
        </div>
        <div class="preview">
          <textarea class="preview-body" id="preview-body" spellcheck="false"></textarea>
        </div>
      </div>

      <!-- Primary page outputs first; shorter, quieter workflow actions second. -->
      <div class="actions" id="actions" hidden>
        <div class="actions-row actions-row-primary">
          <div class="download-split" role="group" aria-label="Download options">
            <button class="btn act act-download act-download-main" id="do-download" type="button">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="M7 10l5 5 5-5"></path>
                <path d="M12 15V3"></path>
              </svg>
              <span>Download</span>
            </button>
            <button class="btn act act-download act-download-location" id="do-download-location" type="button"
                    title="Choose download location" aria-label="Choose download location">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"></path>
                <path d="m9 13 2 2 4-4"></path>
              </svg>
            </button>
          </div>
          <div class="copy-split" role="group" aria-label="Copy options">
            <button class="btn act-copy act-copy-main" id="do-copy" type="button" title="Copy page Markdown" aria-label="Copy page Markdown">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 8h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2Z"></path>
                <path d="M4 16H3a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1"></path>
              </svg>
              <span class="btn-label">Copy</span>
            </button>
            <button class="btn act-copy act-copy-full" id="do-copy-full" type="button" title="Copy complete Markdown with title and metadata" aria-label="Copy complete Markdown with title and metadata">
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M6 2h9l4 4v16H6Z"></path><path d="M14 2v5h5M9 12h7M9 16h7"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="actions-row actions-row-secondary">
          <button class="btn act-workflow" id="do-export" type="button" title="Capture multiple pages as a collection">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m11 3 7 3.5-7 3.5-7-3.5L11 3Z"></path><path d="m4 11 7 3.5 3-1.5M4 15.5l7 3.5 3-1.5"></path><path d="M18 11v9m-3-3 3 3 3-3"></path>
            </svg>
            <span>Capture Collection</span>
          </button>
          <button class="btn act-workflow" id="do-expand" type="button" title="Open the full Markdown editor">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
            </svg>
            <span>Edit Markdown</span>
          </button>
        </div>
      </div>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
