<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Clipper</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1 class="wordmark"><img class="brand-mark" src="../../assets/icons/icon-48.png" alt="">Markdown Clipper</h1>
        <div class="header-actions">
          <button class="icon-button" id="do-sidepanel" type="button" title="Open in side panel" aria-label="Open in side panel" hidden>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <path d="M15 4v16"></path>
            </svg>
          </button>
          <button class="icon-button" id="do-panel" type="button" title="Open in page" aria-label="Open in page" hidden>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <rect x="12" y="12" width="7" height="5" rx="1"></rect>
            </svg>
          </button>
          <button class="icon-button" id="do-expand" type="button" title="Open in full page" aria-label="Open in full page">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M15 3h6v6"></path>
              <path d="M9 21H3v-6"></path>
              <path d="M21 3l-7 7"></path>
              <path d="M3 21l7-7"></path>
            </svg>
          </button>
          <button class="icon-button" id="open-options" type="button" title="Options" aria-label="Options">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 0 1-4 0v-.08A1.7 1.7 0 0 0 9 19.36a1.7 1.7 0 0 0-1.88.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.63 15 1.7 1.7 0 0 0 3.07 14H3a2 2 0 0 1 0-4h.08a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.88l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.63a1.7 1.7 0 0 0 1-1.56V3a2 2 0 0 1 4 0v.08a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.37 9c.18.6.74 1 1.56 1H21a2 2 0 0 1 0 4h-.08a1.7 1.7 0 0 0-1.52 1Z"></path>
            </svg>
          </button>
          <button class="icon-button icon-button-close" id="do-close-panel" type="button" title="Close panel" aria-label="Close panel" hidden>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 5l14 14M19 5L5 19"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Loading state while the preview capture runs -->
      <div class="loading" id="loading">
        <span class="spinner" aria-hidden="true"></span>
        <span>Reading this page&#8230;</span>
      </div>

      <!-- Empty / error state (non-capturable page or capture failure) -->
      <div class="empty" id="empty" hidden>
        <p id="empty-message">This page can&rsquo;t be captured.</p>
      </div>

      <!-- The clip card -->
      <div class="card" id="card" hidden>
        <div class="props" id="props"></div>

        <label class="field field-title">
          <span>Title</span>
          <input id="f-title" type="text" spellcheck="false" autocomplete="off">
        </label>

        <div class="field-row">
          <label class="field field-filename">
            <span>File name</span>
            <span class="filename-input">
              <input id="f-filename" type="text" spellcheck="false" autocomplete="off">
              <span class="ext" aria-hidden="true">.md</span>
            </span>
          </label>
          <label class="field field-tags">
            <span>Tags</span>
            <input id="f-tags" type="text" spellcheck="false" autocomplete="off" placeholder="comma-separated">
          </label>
        </div>

        <label class="field field-description">
          <span>Description</span>
          <textarea id="f-description" rows="2" spellcheck="false"></textarea>
        </label>

        <div class="preview">
          <div class="preview-head">
            <span>Markdown &middot; editable</span>
            <span class="char-count" id="char-count"></span>
          </div>
          <textarea class="preview-body" id="preview-body" spellcheck="false"></textarea>
        </div>
      </div>

      <!-- Quick actions: one click each, equal buttons, no repeated "Markdown". -->
      <div class="actions" id="actions" hidden>
        <p class="section-label">Markdown action</p>
        <div class="actions-row">
          <button class="btn act act-download" id="do-download" type="button">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <path d="M7 10l5 5 5-5"></path>
              <path d="M12 15V3"></path>
            </svg>
            <span>Download</span>
          </button>
          <button class="btn act act-copy" id="do-copy" type="button">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 8h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2Z"></path>
              <path d="M4 16H3a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span>Copy</span>
          </button>
          <button class="btn act act-open" id="do-open" type="button">
            <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M14 3h7v7"></path>
              <path d="M10 14 21 3"></path>
              <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
            </svg>
            <span>Open</span>
          </button>
        </div>
      </div>

      <button class="btn btn-ghost btn-export" id="do-export" type="button">
        <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M3 7l9-4 9 4-9 4-9-4Z"></path>
          <path d="M3 12l9 4 9-4"></path>
          <path d="M3 17l9 4 9-4"></path>
        </svg>
        <span>Export a whole site&#8230;</span>
      </button>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
